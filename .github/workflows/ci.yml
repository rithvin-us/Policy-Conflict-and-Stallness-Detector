name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff
      - name: Lint
        working-directory: backend
        run: ruff check app || true
      - name: Test
        working-directory: backend
        env:
          ANALYSIS_AS_OF: "2026-07-11"
        run: pytest -q

  frontend:
    name: Frontend — build & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        working-directory: frontend
        run: npm install
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Build
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f backend/Dockerfile -t policy-guardian-api .
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t policy-guardian-web .
